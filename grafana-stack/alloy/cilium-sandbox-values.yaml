# Alloy — Cilium Sandbox Values

alloy:
  enableReporting: false
  stabilityLevel: "generally-available"

  configMap:
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      import.file "beyla" {
        filename = "/etc/alloy-extra/beyla.alloy"
      }

      import.file "node_exporter" {
        filename = "/etc/alloy-extra/node-exporter.alloy"
      }

  mounts:
    varlog: true
    dockercontainers: true
    extra:
      - name: beyla-config
        mountPath: /etc/alloy-extra/beyla.alloy
        subPath: beyla.alloy
        readOnly: true
      - name: node-exporter-config
        mountPath: /etc/alloy-extra/node-exporter.alloy
        subPath: node-exporter.alloy
        readOnly: true

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

controller:
  type: daemonset

  tolerations:
    - key: node-role
      operator: Exists
      effect: NoSchedule

  volumes:
    extra:
      - name: beyla-config
        configMap:
          name: alloy-beyla-config
      - name: node-exporter-config
        configMap:
          name: alloy-node-exporter-config
