# Mimir — Cilium Sandbox Values
# Monolithic-style: single replicas, no caches, hard limits to prevent memory bloat

# disable multi-tenancy — single tenant sandbox
mimir:
  structuredConfig:
    multitenancy_enabled: false

    # disable ingest storage (Kafka-based) — use classic ingester path
    ingest_storage:
      enabled: false

    # combined limits block — ingestion caps + retention
    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 20000
      max_global_series_per_user: 100000
      max_fetched_chunks_per_query: 100000
      compactor_blocks_retention_period: 180d

    # compaction settings to keep TSDB head small
    blocks_storage:
      tsdb:
        head_compaction_interval: 30m

# --- disable all caches (main cause of memory bloat) ---
admin-cache:
  enabled: false

chunks-cache:
  enabled: false

index-cache:
  enabled: false

metadata-cache:
  enabled: false

results-cache:
  enabled: false

# --- MinIO for local object storage ---
minio:
  enabled: true
  persistence:
    size: 100Gi
  tolerations:
    - key: node-role
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    node-role: monitor
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  makeBucketJob:
    tolerations:
      - key: node-role
        operator: Exists
        effect: NoSchedule
    nodeSelector:
      node-role: monitor

# --- single replicas with hard memory limits ---
ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  persistentVolume:
    size: 20Gi
  tolerations:
