# Loki — Cilium Sandbox Values
# Single-binary mode, no caches, hard limits to prevent memory bloat

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  structuredConfig:
    limits_config:
      # hard ingestion limits
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      max_streams_per_user: 10000
      max_line_size: 256kb
      # retention
      retention_period: 90d

    compactor:
      retention_enabled: true
      delete_request_store: filesystem

    common:
      replication_factor: 1

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/index
        cache_location: /var/loki/index_cache
      filesystem:
        directory: /var/loki/chunks

# --- single binary: 1 replica ---
singleBinary:
  replicas: 1
  tolerations:
    - key: node-role
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    node-role: monitor
  persistence:
    enabled: true
    size: 30Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# --- disable all caches (main cause of memory bloat) ---
chunksCache:
  enabled: false

resultsCache:
  enabled: false

# --- disable distributed components (not needed in single-binary) ---
read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

bloomGateway:
  replicas: 0

bloomBuilder:
  replicas: 0

bloomPlanner:
  replicas: 0
