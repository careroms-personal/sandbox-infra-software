# Tempo — Cilium Sandbox Values

replicas: 1

tolerations:
  - key: node-role
    operator: Exists
    effect: NoSchedule

nodeSelector:
  node-role: monitor

persistence:
  enabled: true
  size: 20Gi
  accessModes:
    - ReadWriteOnce

serviceMonitor:
  enabled: true

tempo:
  reportingEnabled: false

  # reduce memory ballast from default 1GB to 64MB for sandbox
  memBallastSizeMbs: 64

  # 30 day trace retention
  retention: 720h

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

  # ingestion limits
  overrides:
    max_traces_per_user: 100000
    max_bytes_per_trace: 5000000   # 5MB max per trace

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # only keep OTLP receivers — matches Alloy + Beyla output
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  # metrics generator: disabled (saves memory)
  metricsGenerator:
    enabled: false

# disable tempo-query sidecar (Jaeger UI) — not needed
tempoQuery:
  enabled: false
