apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboard
  namespace: argocd
spec:
  destination:
    namespace: grafana
    server: https://kubernetes.default.svc
  project: default
  source:
    helm:
      valueFiles:
      - cilium-sandbox-values.yaml
    path: grafana-stack/grafana
    repoURL: https://github.com/careroms-personal/sandbox-infra-software.git
    targetRevision: main
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
    - ServerSideApply=true
    - CreateNamespace=true
